<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h4 class="text-muted">Team Task Manager</h4>

    <h2 class="mb-4">Dashboard</h2>

    <div class="row mb-4">
        <div class="col">
            <div class="card p-3 text-center shadow">
                <h5>Total Tasks</h5>
                <h3>{{ total }}</h3>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 text-center shadow">
                <h5>Completed</h5>
                <h3>{{ completed }}</h3>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 text-center shadow">
                <h5>Pending</h5>
                <h3>{{ pending }}</h3>
            </div>
        </div>
    </div>

    <div class="card p-3 shadow">
        <h4>Tasks</h4>
        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between">
                {{ task.title }} - {{ task.status }}
                <a class="btn btn-sm btn-success" href="/complete/{{ task.id }}">Complete</a>
            </li>
            {% endfor %}
        </ul>
    </div>

    <br>

    <a class="btn btn-primary" href="/create_project">Create Project</a>
    <a class="btn btn-secondary" href="/create_task">Create Task</a>

</div>

</body>
</html>
