<!DOCTYPE html>
<html>
<head>
    <title>Create Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2>Create Task</h2>

        <form method="POST">
            <input class="form-control mb-3" type="text" name="title" placeholder="Task Title" required>

            <label>Assign to:</label>
            <select class="form-control mb-3" name="assigned_to">
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>

            <label>Project:</label>
            <select class="form-control mb-3" name="project_id">
                {% for project in projects %}
                    <option value="{{ project.id }}">{{ project.name }}</option>
                {% endfor %}
            </select>

            <button class="btn btn-success w-100">Create Task</button>
        </form>

    </div>
</div>

</body>
</html>
